name: Deploy inbound email worker

# Deploys the Cloudflare Email Worker in workers/inbound-email/. The Next app is
# deployed separately by Vercel — this only handles the Worker, and only runs
# when the Worker's own files change, so app-only commits don't redeploy it.
on:
  push:
    branches: [main]
    paths:
      - "workers/inbound-email/**"
      - ".github/workflows/deploy-inbound-worker.yml"
  # Allow a manual run from the Actions tab (e.g. to re-push the secret).
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/inbound-email
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/inbound-email/package-lock.json

      - name: Install worker deps
        run: npm ci

      - name: Unit-test the reply builder
        run: npm test

      # Deploy the Worker FIRST, with no secrets. Setting a secret on a Worker
      # that doesn't exist yet fails (wrangler-action#162), so the worker must
      # exist before the secret step. `wrangler deploy` is idempotent on reruns.
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/inbound-email
          wranglerVersion: "3"

      # Now that the Worker exists, push the shared secret. The `secrets:` input
      # runs `wrangler secret put` for each name; `command: whoami` is a no-op
      # so this step ONLY sets the secret and doesn't redeploy. The value lives
      # only in GitHub repo secrets and the Worker — never in the repo. Must
      # match INBOUND_SECRET set on the Next app (Vercel env var).
      - name: Set INBOUND_SECRET
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/inbound-email
          wranglerVersion: "3"
          command: whoami
          secrets: |
            INBOUND_SECRET
        env:
          INBOUND_SECRET: ${{ secrets.INBOUND_SECRET }}
